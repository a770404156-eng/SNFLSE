<!DOCTYPE html>
<html lang="ar">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="/imgs/Logo.jpg">
    <link rel="apple-touch-icon" href="/imgs/Logo.jpg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500;600&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/general.css">
    <link rel="stylesheet" href="styles/header.css">
    <link rel="stylesheet" href="styles/news.css">
    <title>الأخبار والنشاطات — SNFLSE</title>
  </head>

  <body>

    <!-- ─── HEADER ──────────────────────────────────────── -->
    <header class="header">
      <div class="left-icons">
        <div class="share-wrapper">
          <button class="icon-btn" id="shareIcon" aria-label="مشاركة" aria-expanded="false" aria-haspopup="true">
            <img src="imgs/share-icon.svg" class="header-icon" alt="مشاركة">
          </button>
          <div class="share-dropdown" id="shareDropdown" role="menu">
            <a href="https://www.facebook.com/share/g/1HC8PSadK2/" target="_blank" rel="noopener noreferrer" class="share-item" role="menuitem">
              <svg class="share-item-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="#1877F2">
                <path d="M24 12.073C24 5.405 18.627 0 12 0S0 5.405 0 12.073C0 18.1 4.388 23.094 10.125 24v-8.437H7.078v-3.49h3.047V9.413c0-3.018 1.791-4.688 4.532-4.688 1.313 0 2.686.235 2.686.235v2.953h-1.513c-1.491 0-1.956.928-1.956 1.879v2.281h3.328l-.532 3.49h-2.796V24C19.612 23.094 24 18.1 24 12.073z"/>
              </svg>
              Facebook
            </a>
            <a href="mailto:YOUR_EMAIL@gmail.com" class="share-item" role="menuitem">
              <svg class="share-item-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                <path d="M24 5.457v13.909c0 .904-.732 1.636-1.636 1.636h-3.819V11.73L12 16.64l-6.545-4.91v9.273H1.636A1.636 1.636 0 010 19.366V5.457c0-.906.732-1.636 1.636-1.636h.749L12 10.91l9.615-7.089h.749A1.636 1.636 0 0124 5.457z" fill="#EA4335"/>
              </svg>
              Gmail
            </a>
          </div>
        </div>
        <button class="icon-btn" aria-label="الموقع">
          <img src="imgs/location.svg" class="header-icon" alt="الموقع">
        </button>
      </div>

      <div class="logo">
        <img src="imgs/Logo.jpg" alt="شعار النقابة">
      </div>

      <div class="right-side">
        <button class="menu-btn" id="menuBtn" aria-label="فتح القائمة" aria-expanded="false" aria-controls="mobileMenu">
          <img src="imgs/menu-btn.svg" class="header-icon" alt="">
        </button>
        <nav class="desktop-menu" aria-label="التنقل الرئيسي">
          <a href="index.html">الرئيسية</a>
          <a href="news.html" class="active">الأخبار والنشاطات</a>
          <a href="form.html">استمارة الانخراط</a>
          <a href="contact.html">اتصل بنا</a>
        </nav>
      </div>
    </header>

    <nav class="mobile-menu" id="mobileMenu" aria-label="القائمة المتنقلة" aria-hidden="true">
      <a href="index.html">الرئيسية</a>
      <a href="news.html" class="active">الأخبار والنشاطات</a>
      <a href="form.html">استمارة الانخراط</a>
      <a href="contact.html">اتصل بنا</a>
    </nav>

    <!-- ─── PAGE HERO ────────────────────────────────────── -->
    <div class="page-hero">
      <p class="page-hero-label">SNFLSE</p>
      <h1 class="page-hero-title">الأخبار والنشاطات</h1>
    </div>

    <!-- ─── MAIN ─────────────────────────────────────────── -->
    <main class="news-page">

      <!-- Filter bar -->
      <div class="news-filters" role="group" aria-label="تصفية الأخبار">
        <button class="filter-btn active" data-filter="all">الكل</button>
        <button class="filter-btn" data-filter="news">أخبار</button>
        <button class="filter-btn" data-filter="photo">صور</button>
        <button class="filter-btn" data-filter="video">فيديو</button>
      </div>

      <!-- News grid -->
      <div class="news-grid" id="newsGrid"></div>
    </main>

    <!-- ─── LIGHTBOX ──────────────────────────────────────── -->
    <div class="lightbox" id="lightbox" role="dialog" aria-modal="true" aria-label="عرض الصورة">
      <div class="lightbox-inner">
        <button class="lightbox-close" id="lightboxClose" aria-label="إغلاق">✕</button>
        <button class="lightbox-nav lightbox-prev" id="lightboxPrev" aria-label="السابق">‹</button>
        <img class="lightbox-img" id="lightboxImg" src="" alt="صورة موسعة">
        <button class="lightbox-nav lightbox-next" id="lightboxNext" aria-label="التالي">›</button>
        <p class="lightbox-counter" id="lightboxCounter"></p>
      </div>
    </div>

    <!-- ─── FOOTER ────────────────────────────────────────── -->
    <footer class="footer">
      <div class="footer-inner">
        <div class="footer-logo">
          <img src="imgs/Logo.jpg" alt="شعار النقابة">
          <span>S.N.F.L.S.E</span>
        </div>
        <p class="footer-copy" dir="rtl">
          © 2025 النقابة الوطنية المستقلة لموظفي مخابر التربية — جميع الحقوق محفوظة
        </p>
      </div>
    </footer>

    <!-- Post Modal -->
    <div id="postModal" class="post-modal-overlay" role="dialog" aria-modal="true">
      <div class="post-modal">
        <button class="post-modal-close" id="postModalClose" aria-label="إغلاق">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
            <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
          </svg>
        </button>

        <!-- Media section -->
        <div class="post-modal-media" id="postModalMedia"></div>

        <!-- Body -->
        <div class="post-modal-body">
          <span class="post-modal-category" id="postModalCategory"></span>
          <h2 class="post-modal-title" id="postModalTitle"></h2>
          <p class="post-modal-content" id="postModalContent"></p>
          <div class="post-modal-date" id="postModalDate">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
              <path d="M19 4h-1V2h-2v2H8V2H6v2H5C3.9 4 3 4.9 3 6v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 16H5V10h14v10zm0-12H5V6h14v2z"/>
            </svg>
            <span id="postModalDateText"></span>
          </div>
        </div>
      </div>
    </div>

    <script src="scripts/news.js"></script>
  </body>
</html>
