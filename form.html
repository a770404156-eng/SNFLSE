  <!-- ─── HERO ───────────────── -->
  <div class="page-hero">
    <p class="page-hero-label">SNFLSE</p>
    <h1 class="page-hero-title">استمارة الانخراط</h1>
  </div>

  <!-- ─── FORM ───────────────── -->
  <main class="form-page">

    <div class="form-card">

      <h2 class="form-title">طلب الانضمام</h2>

      <form id="membershipForm">

        <div class="form-row">
          <div class="form-group">
            <label class="form-label">الاسم *</label>
            <input type="text" name="firstName" class="form-input" required>
          </div>

          <div class="form-group">
            <label class="form-label">اللقب *</label>
            <input type="text" name="lastName" class="form-input" required>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">البريد الإلكتروني *</label>
          <input type="email" name="email" class="form-input" dir="ltr" required>
        </div>

        <div class="form-group">
          <label class="form-label">رقم الهاتف *</label>
          <input type="text" name="phone" class="form-input" dir="ltr" required>
        </div>

        <div class="form-group">
          <label class="form-label">الوظيفة *</label>
          <input type="text" name="work" class="form-input" required>
        </div>

        <div class="form-group">
          <label class="form-label">الولاية *</label>
          <input type="text" name="state" class="form-input" required>
        </div>

        <div class="form-group">
          <label class="form-label">رقم الضمان الاجتماعي *</label>
          <input type="text" name="ssn" class="form-input" dir="ltr" inputmode="numeric">
        </div>

        <button type="submit" class="form-submit">إرسال الطلب</button>

      </form>

      <!-- Success -->
      <div id="formSuccess" class="form-success">
        <p class="form-success-text">تم إرسال الطلب بنجاح</p>
      </div>

    </div>

  </main>

  <!-- ─── FOOTER ───────────────── -->
  <footer class="footer">
    <div class="footer-inner">
      <div class="footer-logo">
        <img src="imgs/Logo.jpg">
        <span>S.N.F.L.S.E</span>
      </div>
      <p class="footer-copy">© 2025 جميع الحقوق محفوظة</p>
    </div>
  </footer>

<script src="scripts/main.js"></script>
</body>
